function smoothstep(x) {
  return x * x * (3 - 2 * x);
}

// Returns a 0→1→0 value with brief holds at each end, looping over `periodMs`
function cyclePhase(elapsedMs, periodMs) {
  const p = (elapsedMs % periodMs) / periodMs;
  if (p < 0.35) return smoothstep(p / 0.35);
  if (p < 0.5) return 1;
  if (p < 0.85) return 1 - smoothstep((p - 0.5) / 0.35);
  return 0;
}

function lerpJoint(a, b, t) {
  const y = a.y + (b.y - a.y) * t;
  if (a.dx === undefined) return { y };
  const dx = a.dx + (b.dx - a.dx) * t;
  return { y, dx };
}

// Furniture is drawn from fixed reference points (poseA) so the
// bench/seat stays put even while the body animates on top of it.
function Furniture({ type, ref: refPose }) {
  if (!type) return null;
  if (type === "bench") {
    const y = refPose.hip.y + 18;
    return <rect x="8" y={y} width="104" height="9" rx="3" fill={C.panelBorder} />;
  }
  // seat: a small pad under the hips plus a backrest behind the torso
  const seatY = refPose.hip.y + 14;
  const backTop = refPose.shoulder.y - 6;
  return (
    <g>
      <rect x="42" y={backTop} width="12" height={seatY - backTop + 6} rx="3" fill={C.panelBorder} opacity="0.6" />
      <rect x="34" y={seatY} width="52" height="9" rx="3" fill={C.panelBorder} />
    </g>
  );
}

function AnimatedFigure({ poseA, poseB, label, caption, furniture }) {
  const [phase, setPhase] = useState(0);
  const rafRef = useRef(null);
  const startRef = useRef(null);

  useEffect(() => {
    const period = 2600;
    function tick(now) {
      if (startRef.current === null) startRef.current = now;
      const elapsed = now - startRef.current;
      setPhase(cyclePhase(elapsed, period));
      rafRef.current = requestAnimationFrame(tick);
    }
    rafRef.current = requestAnimationFrame(tick);
    return () => cancelAnimationFrame(rafRef.current);
  }, []);

  const j = {};
  for (const key of Object.keys(poseA)) {
    j[key] = lerpJoint(poseA[key], poseB[key], phase);
  }
  const cx = 60;
  const pt = (joint, side) => ({ x: cx + side * (joint.dx ?? 0), y: joint.y });

  const limbStroke = { stroke: C.text, strokeWidth: 5, strokeLinecap: "round", fill: "none" };
  const armStroke = { ...limbStroke, stroke: C.accent };

  const sL = pt(j.shoulder, -1), sR = pt(j.shoulder, 1);
  const hL = pt(j.hip, -1), hR = pt(j.hip, 1);
  const kL = pt(j.knee, -1), kR = pt(j.knee, 1);
  const aL = pt(j.ankle, -1), aR = pt(j.ankle, 1);
  const eL = pt(j.elbow, -1), eR = pt(j.elbow, 1);
  const wL = pt(j.wrist, -1), wR = pt(j.wrist, 1);
  const headPt = { x: cx, y: j.head.y };

  const Line = (p1, p2, stroke) => <line x1={p1.x} y1={p1.y} x2={p2.x} y2={p2.y} {...stroke} />;

  return (
    <div className="p-3" style={{ borderRadius: 10, background: C.inputBg, border: `1px solid ${C.panelBorder}` }}>
      <div className="flex items-center justify-between mb-1">
        <span style={{ ...mono, fontSize: 10, textTransform: "uppercase", letterSpacing: "0.15em", color: C.accent }}>
          {label}
        </span>
      </div>
      <svg viewBox="0 -10 120 175" style={{ width: "100%", height: 150, display: "block" }}>
        {/* ground */}
        <line x1="14" y1="164" x2="106" y2="164" stroke={C.panelBorder} strokeWidth="2" />
        {/* furniture (bench/seat), drawn behind the body */}
        <Furniture type={furniture} ref={poseA} />
        {/* torso */}
        {Line({ x: cx, y: sL.y }, { x: cx, y: hL.y }, limbStroke)}
        {Line(sL, sR, { ...limbStroke, strokeWidth: 4 })}
        {Line(hL, hR, { ...limbStroke, strokeWidth: 4 })}
        {/* legs */}
        {Line(hL, kL, limbStroke)}
        {Line(kL, aL, limbStroke)}
        {Line(hR, kR, limbStroke)}
        {Line(kR, aR, limbStroke)}
        {/* feet */}
        {Line(aL, { x: aL.x - 8, y: aL.y }, limbStroke)}
        {Line(aR, { x: aR.x + 8, y: aR.y }, limbStroke)}
        {/* arms */}
        {Line(sL, eL, armStroke)}
        {Line(eL, wL, armStroke)}
        {Line(sR, eR, armStroke)}
        {Line(eR, wR, armStroke)}
        {/* head */}
        <circle cx={headPt.x} cy={headPt.y} r="10" fill={C.textDim} />
        {/* joints */}
        <circle cx={hL.x} cy={hL.y} r="3" fill={C.success} />
        <circle cx={hR.x} cy={hR.y} r="3" fill={C.success} />
        <circle cx={wL.x} cy={wL.y} r="3.5" fill={C.accent} />
        <circle cx={wR.x} cy={wR.y} r="3.5" fill={C.accent} />
      </svg>
      {caption && (
        <p style={{ fontSize: 11, color: C.textDim, textAlign: "center", marginTop: 2 }}>{caption}</p>
      )}
    </div>
  );
}

const WEEKDAY_LABELS = ["S", "M", "T", "W", "T", "F", "S"];

function buildSessionsByDate(log) {
  const map = {};
  for (const day of DAYS) {
    for (const ex of PROGRAM[day]) {
      const entry = log?.[day]?.[ex.id];
      if (!entry) continue;
      const history = entry.history
        || (entry.lastWeight || entry.lastReps
          ? [{ date: entry.date || todayStr(), weight: entry.lastWeight || "", reps: entry.lastReps || "" }]
          : []);
      for (const h of history) {
        if (!map[h.date]) map[h.date] = [];
        map[h.date].push({ day, exerciseName: ex.name, weight: h.weight, reps: h.reps });
      }
    }
  }
  return map;
}

function HistoryView({ log }) {
  const now = new Date();
  const [viewDate, setViewDate] = useState({ year: now.getFullYear(), month: now.getMonth() });
  const [selectedDate, setSelectedDate] = useState(null);

  const sessionsByDate = buildSessionsByDate(log);
  const totalSessions = Object.keys(sessionsByDate).length;

  const { year, month } = viewDate;
  const first = new Date(year, month, 1);
  const startWeekday = first.getDay();
  const numDays = new Date(year, month + 1, 0).getDate();
  const monthLabel = first.toLocaleDateString(undefined, { month: "long", year: "numeric" });
  const dateStr = (d) => `${year}-${String(month + 1).padStart(2, "0")}-${String(d).padStart(2, "0")}`;

  const cells = [];
  for (let i = 0; i < startWeekday; i++) cells.push(null);
  for (let d = 1; d <= numDays; d++) cells.push(d);

  const changeMonth = (delta) => {
    setSelectedDate(null);
    setViewDate((v) => {
      let m = v.month + delta;
      let y = v.year;
      if (m < 0) { m = 11; y -= 1; }
      if (m > 11) { m = 0; y += 1; }
      return { year: y, month: m };
    });
  };

  return (
    <div>
      <div className="flex items-center justify-between mb-3">
        <button
          onClick={() => changeMonth(-1)}
          aria-label="Previous month"
          style={{ background: "transparent", border: "none", color: C.textDim, fontSize: 18, padding: 4 }}
        >
          ‹
        </button>
        <span style={{ ...oswald, fontSize: 16, fontWeight: 600, color: C.text }}>{monthLabel}</span>
        <button
          onClick={() => changeMonth(1)}
          aria-label="Next month"
          style={{ background: "transparent", border: "none", color: C.textDim, fontSize: 18, padding: 4 }}
        >
          ›
        </button>
      </div>

      <p style={{ ...mono, fontSize: 12, color: C.textDim, marginBottom: 10, textAlign: "center" }}>
        {totalSessions} session{totalSessions === 1 ? "" : "s"} logged total
      </p>

      <div className="grid grid-cols-7 gap-1 mb-1.5">
        {WEEKDAY_LABELS.map((w, i) => (
          <div key={i} style={{ ...mono, fontSize: 10, color: C.textFaint, textAlign: "center" }}>{w}</div>
        ))}
      </div>

      <div className="grid grid-cols-7 gap-1">
        {cells.map((d, i) => {
          if (d === null) return <div key={i} />;
          const ds = dateStr(d);
          const has = !!sessionsByDate[ds];
          const isToday = ds === todayStr();
          const isSelected = ds === selectedDate;
          return (
            <button
              key={i}
              onClick={() => has && setSelectedDate(isSelected ? null : ds)}
              disabled={!has}
              style={{
                position: "relative",
                aspectRatio: "1",
                borderRadius: 8,
                background: isSelected ? C.accent : "transparent",
                border: isToday ? `1px solid ${C.accent}` : `1px solid ${has ? C.panelBorder : "transparent"}`,
                color: isSelected ? C.accentDark : has ? C.text : C.textFaint,
                cursor: has ? "pointer" : "default",
                ...mono,
                fontSize: 12,
              }}
            >
              {d}
              {has && !isSelected && (
                <span style={{ position: "absolute", bottom: 4, left: "50%", transform: "translateX(-50%)", width: 4, height: 4, borderRadius: 999, background: C.accent }} />
              )}
            </button>
          );
        })}
      </div>

      {selectedDate && sessionsByDate[selectedDate] && (
        <div className="mt-4 p-3" style={{ borderRadius: 10, background: C.panel, border: `1px solid ${C.panelBorder}` }}>
          <div style={{ ...mono, fontSize: 11, color: C.accent, textTransform: "uppercase", letterSpacing: "0.1em", marginBottom: 8 }}>
            {fmtDate(selectedDate)}
          </div>
          <div className="space-y-1.5">
            {sessionsByDate[selectedDate].map((s, i) => (
              <div key={i} className="flex items-center justify-between" style={{ ...mono, fontSize: 12, color: C.text }}>
                <span>{s.exerciseName}</span>
                <span style={{ color: C.textDim }}>{s.weight || "—"} lbs × {s.reps || "—"} reps</span>
              </div>
            ))}
          </div>
        </div>
      )}

      {totalSessions === 0 && (
        <p className="text-center mt-8" style={{ ...mono, fontSize: 12, color: C.textFaint, lineHeight: 1.6 }}>
          No sessions logged yet — log a weight or reps<br />to see it show up here.
        </p>
      )}
    </div>
  );
}

                background: C.inputBg,
                border: `1px solid ${C.inputBorder}`,
                borderRadius: 8,
                fontSize: 14,
                color: C.text,
                WebkitTextFillColor: C.text,
                ...mono,
              }}
            />
            <div className="flex gap-1.5 flex-1 justify-end">
              {Array.from({ length: totalSets }).map((_, i) => {
                const done = dayLog?.completed?.[i];
                return (
                  <button
                    key={i}
                    onClick={() => onToggleSet(i)}
                    aria-label={`Set ${i + 1} ${done ? "complete" : "incomplete"}`}
                    className="flex items-center justify-center"

                      width: 36,

                      borderRadius: 8,

                  </button>
                );
              })}
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

function App() {
  const [topView, setTopView] = useState("log"); // "log" | "history"
  const [selectedDay, setSelectedDay] = useState("Upper A");
  const [expandedId, setExpandedId] = useState(null);
  const [log, setLog] = useState({});
  const [loaded, setLoaded] = useState(false);
  const [saveError, setSaveError] = useState(false);

  useEffect(() => {
    try {
      const raw = localStorage.getItem(STORAGE_KEY);
      if (raw) setLog(JSON.parse(raw));
    } catch {
      // no existing data yet, or storage unavailable
    } finally {
      setLoaded(true);
    }
  }, []);

  const persist = useCallback((next) => {
    try {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(next));
      setSaveError(false);
    } catch {
      setSaveError(true);
    }
  }, []);

  // Debounce writes so rapid taps/keystrokes collapse into one save
  // instead of firing a storage call per interaction.
  useEffect(() => {
    if (!loaded) return;
    const t = setTimeout(() => {
      persist(log);
    }, 500);
    return () => clearTimeout(t);
  }, [log, loaded, persist]);

  const getDayLog = (day, exId) => {
    const entry = log?.[day]?.[exId];
    if (!entry) return { completed: [], history: [] };

    // migrate legacy single-value entries (lastWeight/lastReps) into history once
    let history = entry.history;
    if (!history) {
      history = entry.lastWeight || entry.lastReps
        ? [{ date: entry.date || todayStr(), weight: entry.lastWeight || "", reps: entry.lastReps || "" }]
        : [];
    }

    const completed = entry.completedDate === todayStr() ? entry.completed || [] : [];
    return { completed, history };
  };

  const toggleSet = (day, exId, setIndex, totalSets) => {
    setLog((prev) => {
      const prevEntry = prev?.[day]?.[exId];
      const current = getDayLog(day, exId);
      const completed = [...(current.completed || [])];
      while (completed.length < totalSets) completed.push(false);
      completed[setIndex] = !completed[setIndex];
      return {
        ...prev,
        [day]: {
          ...(prev[day] || {}),
          [exId]: { history: current.history, completed, completedDate: todayStr() },
        },
      };
    });
  };

  const updateLast = (day, exId, field, value) => {
    setLog((prev) => {
      const current = getDayLog(day, exId);
      const today = todayStr();
      const history = [...(current.history || [])];
      const idx = history.findIndex((h) => h.date === today);
      if (idx >= 0) {
        history[idx] = { ...history[idx], [field]: value };
      } else {
        history.push({ date: today, weight: "", reps: "", [field]: value });
      }
      // keep the log from growing forever
      const trimmed = history.slice(-60);
      const prevExEntry = prev[day]?.[exId] || {};
      return {
        ...prev,
        [day]: {
          ...(prev[day] || {}),
          [exId]: { completed: prevExEntry.completed || [], completedDate: prevExEntry.completedDate, history: trimmed },
        },
      };
    });
  };

  const resetToday = () => {
    setLog((prev) => {
      const dayData = prev[selectedDay] || {};
      return {
        ...prev,
        [selectedDay]: Object.fromEntries(
          Object.entries(dayData).map(([id, e]) => [id, { ...e, completed: [], completedDate: null }])
        ),
      };
    });
  };

  const [confirmClear, setConfirmClear] = useState(false);
  useEffect(() => {
    if (topView !== "history") setConfirmClear(false);
  }, [topView]);
  const clearAllHistory = () => {
    if (!confirmClear) {
      setConfirmClear(true);
      return;
    }
    setLog({});
    setConfirmClear(false);
  };

  const exercises = PROGRAM[selectedDay];
  const totalSetsToday = exercises.reduce((sum, e) => sum + e.sets, 0);
  const completedSetsToday = exercises.reduce((sum, e) => {
    const d = getDayLog(selectedDay, e.id);
    return sum + (d.completed || []).filter(Boolean).length;
  }, 0);
  const pct = totalSetsToday ? Math.round((completedSetsToday / totalSetsToday) * 100) : 0;

  if (!loaded) {
    return (
      <div className="min-h-screen flex items-center justify-center" style={{ background: C.bg }}>
        <div style={{ ...mono, color: C.textDim, fontSize: 14 }}>loading…</div>
      </div>
    );
  }

  return (
    <div className="min-h-screen" style={{ background: C.bg, fontFamily: "'Inter', sans-serif" }}>
      <style>{`
        @import url('https://fonts.googleapis.com/css2?family=Manrope:wght@500;600;700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap');
        input::placeholder { color: ${C.textFaint}; opacity: 1; }
        input { -webkit-appearance: none; appearance: none; }
      `}</style>

      <div className="max-w-md mx-auto px-4 pt-8 pb-16">
        {/* Header */}
        <div className="mb-6">
          <div style={{ ...mono, fontSize: 10, letterSpacing: "0.25em", color: C.accent, textTransform: "uppercase", marginBottom: 4 }}>
            Beginner Hypertrophy — Week Cycle
          </div>
          <h1 style={{ ...oswald, fontSize: 30, fontWeight: 700, color: C.text, letterSpacing: "-0.01em" }}>
            Training Log
          </h1>
        </div>

        {/* Top-level tab: Log vs History */}
        <div className="flex gap-1.5 mb-5" style={{ background: C.panel, borderRadius: 10, padding: 4, border: `1px solid ${C.panelBorder}` }}>
          {[{ key: "log", label: "Workout Log" }, { key: "history", label: "History" }].map((t) => {
            const active = topView === t.key;
            return (
              <button
                key={t.key}
                onClick={() => setTopView(t.key)}
                className="flex-1 py-2"
                style={{
                  ...oswald,
                  borderRadius: 7,
                  fontSize: 13,
                  fontWeight: 500,
                  background: active ? C.accent : "transparent",
                  color: active ? C.accentDark : C.textDim,
                  border: "none",
                }}
              >
                {t.label}
              </button>
            );
          })}
        </div>

        {topView === "history" ? (
          <>
            <HistoryView log={log} />
            <div className="mt-6 text-center">
              <button
                onClick={clearAllHistory}
                style={{
                  ...mono,
                  fontSize: 12,
                  color: confirmClear ? C.avoidLabel : C.textFaint,
                  background: "transparent",
                  border: `1px solid ${confirmClear ? C.avoidLabel : C.panelBorder}`,
                  borderRadius: 8,
                  padding: "6px 12px",
                }}
              >
                {confirmClear ? "Tap again to confirm — this can't be undone" : "Clear all history"}
              </button>
            </div>
          </>
        ) : (
          <>
            {/* Day tabs */}
            <div className="flex gap-1.5 mb-5 overflow-x-auto pb-1">
              {DAYS.map((day) => {
                const active = selectedDay === day;
                return (
                  <button
                    key={day}
                    onClick={() => {
                      setSelectedDay(day);
                      setExpandedId(null);
                    }}
                    className="whitespace-nowrap px-3.5 py-2"
                    style={{
                      ...oswald,
                      borderRadius: 8,
                      fontSize: 14,
                      fontWeight: 500,
                      background: active ? C.accent : C.panel,
                      color: active ? C.accentDark : C.textDim,
                      border: active ? "none" : `1px solid ${C.panelBorder}`,
                    }}
                  >
                    {day}
                  </button>
                );
              })}
            </div>

            {/* Progress meter */}
            <div className="p-4 mb-5" style={{ borderRadius: 12, background: C.panel, border: `1px solid ${C.panelBorder}` }}>
              <div className="flex items-center justify-between mb-3">
                <div className="flex items-center gap-1.5" style={{ color: C.text, fontSize: 14, fontWeight: 600 }}>
                  <Flame size={14} color={C.accent} />
                  Today's load
                </div>
                <div className="flex items-center gap-3">
                  <span style={{ ...mono, fontSize: 12, color: C.textDim }}>
                    {completedSetsToday}/{totalSetsToday} sets
                  </span>
                  <button onClick={resetToday} aria-label="Reset today's checkmarks" style={{ background: "transparent", border: "none", color: C.textFaint }}>
                    <RotateCcw size={14} />
                  </button>
                </div>
              </div>
              <BarbellMeter pct={pct} />
            </div>

            {/* Exercises */}
            <div className="space-y-2.5">
              {exercises.map((ex) => (
                <ExerciseCard
                  key={ex.id}
                  exercise={ex}
                  dayLog={getDayLog(selectedDay, ex.id)}
                  expanded={expandedId === ex.id}
                  onToggleExpand={() => setExpandedId(expandedId === ex.id ? null : ex.id)}
                  onToggleSet={(i) => toggleSet(selectedDay, ex.id, i, ex.sets)}
                  onUpdateLast={(field, val) => updateLast(selectedDay, ex.id, field, val)}
                />
              ))}
            </div>
          </>
        )}

        {saveError && (
          <p className="text-center mt-4" style={{ ...mono, fontSize: 12, color: C.avoidLabel }}>
            Couldn't save progress — it'll still work this session.
          </p>
        )}

        <p className="text-center mt-8" style={{ ...mono, fontSize: 12, color: C.textFainter, lineHeight: 1.6 }}>
          Tap a set circle after you finish it. Weight and reps carry over<br />
          as your reference for next time.
        </p>
      </div>
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(<App />);
</script>
</body>
</html>
